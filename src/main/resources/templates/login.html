<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Course Registration - Login</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}" />
</head>
<body class="login-page">

    <div class="login-container">
        <div class="logo">🎓</div>
        <h1>University Portal</h1>
        <p>Sign in to access your course registration system</p>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Student ID / Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <div th:if="${param.error}" class="login-error">
                Invalid username or password.
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="footer-text">
            © 2026 University Course Registration System
        </div>
    </div>

</body>
</html>
