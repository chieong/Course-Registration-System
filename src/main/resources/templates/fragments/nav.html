<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <body>
        <nav th:fragment="nav">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/ViewMasterClassSchedule}"
               sec:authorize="isAuthenticated()">View Master Class Schedule</a>
            <a th:href="@{/timetable}"
               sec:authorize="hasAnyRole('ADMIN','STUDENT','INSTRUCTOR')">View Timetable</a>
            <a th:href="@{/manageplan}"
               sec:authorize="hasAnyRole('ADMIN','STUDENT')">Manage Plan</a>
            <a th:href="@{/ManageCourse}"
               sec:authorize="hasRole('ADMIN')">Manage Course</a>
            <a th:href="@{/ManageUser}"
               sec:authorize="hasRole('ADMIN')">Manage User</a>
            <a th:href="@{/studentlist}"
               sec:authorize="hasAnyRole('ADMIN','INSTRUCTOR')">View Student List</a>
            <span class="nav-spacer"></span>
            <span sec:authorize="isAuthenticated()" class="nav-username">
                <span sec:authentication="name"></span>
            </span>
            <form th:action="@{/logout}" method="post"
                  sec:authorize="isAuthenticated()" class="nav-logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="nav-logout-btn">Log Out</button>
            </form>
            <a th:href="@{/login}" sec:authorize="!isAuthenticated()">Log In</a>
        </nav>
    </body>
</html>
